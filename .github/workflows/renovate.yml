name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  renovate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: docker://renovate/renovate:latest
        env:
          RENOVATE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
